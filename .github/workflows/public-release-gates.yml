name: Public release gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run release gate
        run: python3 release_snapshot.py

      - name: Verify generated artifacts are committed
        run: |
          git diff --exit-code -- \
            data/live-bdbv-2026-output.json \
            data/snapshot_contract.json \
            brief/brief.html \
            brief/visuals \
            deliverables/brief.pdf \
            deliverables/public-health-dataset
