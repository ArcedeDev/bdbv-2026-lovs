name: Public release gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run public repository hygiene gate
        run: python3 -m lovs.public_repo_hygiene

      - name: Check public export artifacts
        run: python3 -m lovs.public_exports --check

      - name: Run public tests
        run: python3 -m unittest discover -s tests
