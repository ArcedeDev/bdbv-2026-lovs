name: Public release gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public repository hygiene gate
        run: python3 -m lovs.public_repo_hygiene

      - name: Run public hygiene tests
        run: python3 -m unittest discover -s tests -p "test_public_repo_hygiene.py"
